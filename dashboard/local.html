<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Job Agent — Local Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
         background: #0d1117; color: #c9d1d9; padding: 24px; min-height: 100vh; }
  h1 { font-size: 28px; color: #58a6ff; margin-bottom: 4px; }
  .sub { color: #8b949e; margin-bottom: 24px; font-size: 14px; }
  .stats { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; margin-bottom: 32px; }
  .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 16px; }
  .card .label { font-size: 12px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; }
  .card .value { font-size: 32px; font-weight: 600; margin-top: 4px; }
  .applied { color: #3fb950; }
  .pending { color: #d29922; }
  .failed { color: #f85149; }
  .skipped { color: #8b949e; }
  table { width: 100%; border-collapse: collapse; background: #161b22; border-radius: 8px; overflow: hidden; }
  th { background: #21262d; padding: 12px; text-align: left; font-size: 12px;
       text-transform: uppercase; color: #8b949e; }
  td { padding: 12px; border-bottom: 1px solid #21262d; font-size: 14px; }
  tr:hover { background: #1c2128; }
  .status { padding: 4px 10px; border-radius: 12px; font-size: 12px; }
  .status-APPLIED { background: #1f6f3f; color: #c8e6c9; }
  .status-AWAITING_MANUAL_SUBMIT { background: #7d4f0a; color: #ffe082; }
  .status-FAILED { background: #6f1f1f; color: #f8c8c4; }
  .status-SKIPPED { background: #3d3d3d; color: #c9d1d9; }
  .status-REJECTED { background: #3d3d3d; color: #8b949e; }
  a { color: #58a6ff; text-decoration: none; }
  a:hover { text-decoration: underline; }
  .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .filters { display: flex; gap: 12px; }
  .filters input, .filters select {
    background: #0d1117; border: 1px solid #30363d; color: #c9d1d9;
    padding: 8px 12px; border-radius: 6px; font-size: 14px;
  }
  .refresh { background: #238636; color: white; border: 0; padding: 8px 16px;
             border-radius: 6px; cursor: pointer; font-size: 14px; }
  .empty { text-align: center; padding: 48px; color: #8b949e; }
  .empty h3 { color: #c9d1d9; margin-bottom: 8px; }
  .ts { color: #8b949e; font-size: 12px; }
</style>
</head>
<body>

<h1>🤖 Job Agent — Local Dashboard</h1>
<p class="sub">Reads from <code>setup/applied_jobs.json</code> on your laptop. No internet required.</p>

<div class="stats" id="stats">
  <div class="card"><div class="label">Total</div><div class="value" id="stat-total">—</div></div>
  <div class="card"><div class="label">Applied</div><div class="value applied" id="stat-applied">—</div></div>
  <div class="card"><div class="label">Awaiting Submit</div><div class="value pending" id="stat-pending">—</div></div>
  <div class="card"><div class="label">Failed</div><div class="value failed" id="stat-failed">—</div></div>
  <div class="card"><div class="label">Today</div><div class="value applied" id="stat-today">—</div></div>
</div>

<div class="toolbar">
  <div class="filters">
    <input type="text" id="search" placeholder="Search company or title..." oninput="render()" />
    <select id="filterStatus" onchange="render()">
      <option value="">All statuses</option>
      <option value="APPLIED">Applied</option>
      <option value="AWAITING_MANUAL_SUBMIT">Awaiting Submit</option>
      <option value="FAILED">Failed</option>
      <option value="SKIPPED">Skipped</option>
    </select>
    <select id="filterPlatform" onchange="render()">
      <option value="">All platforms</option>
    </select>
  </div>
  <button class="refresh" onclick="loadData()">↻ Refresh</button>
</div>

<table>
  <thead>
    <tr>
      <th>When</th>
      <th>Company</th>
      <th>Role</th>
      <th>Platform</th>
      <th>Score</th>
      <th>Status</th>
      <th>Link</th>
    </tr>
  </thead>
  <tbody id="rows"></tbody>
</table>

<script>
let allRows = [];

async function loadData() {
  // Load via fetch from filesystem (need to open this file as file://)
  try {
    // Try fetch first (works if served via http)
    const res = await fetch('../setup/applied_jobs.json');
    if (res.ok) {
      const data = await res.json();
      allRows = data.applications || [];
    } else throw new Error('not found');
  } catch (e) {
    document.getElementById('rows').innerHTML = `<tr><td colspan="7" class="empty">
      <h3>No applications yet</h3>
      <p>The agent hasn't applied to any jobs yet, or this file needs to be served via HTTP.</p>
      <p style="margin-top: 8px; font-size: 12px;">To view: open a terminal and run:</p>
      <pre style="margin-top: 8px; background: #0d1117; padding: 12px; border-radius: 6px; display: inline-block;">cd "C:\\Users\\Dev\\Desktop\\Job Agents\\job-agent"
python -m http.server 8000
Then open: http://localhost:8000/dashboard/local.html</pre>
    </td></tr>`;
    return;
  }
  populatePlatformFilter();
  render();
  updateStats();
}

function populatePlatformFilter() {
  const platforms = [...new Set(allRows.map(r => r.platform).filter(Boolean))].sort();
  const sel = document.getElementById('filterPlatform');
  while (sel.options.length > 1) sel.remove(1);
  platforms.forEach(p => sel.add(new Option(p, p)));
}

function render() {
  const search = document.getElementById('search').value.toLowerCase();
  const fStatus = document.getElementById('filterStatus').value;
  const fPlatform = document.getElementById('filterPlatform').value;

  const filtered = allRows.filter(r => {
    if (fStatus && r.status !== fStatus) return false;
    if (fPlatform && r.platform !== fPlatform) return false;
    if (search && !((r.company || '') + (r.job_title || '')).toLowerCase().includes(search)) return false;
    return true;
  }).slice().reverse();

  const tbody = document.getElementById('rows');
  if (filtered.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7" class="empty"><h3>No applications yet</h3><p>The agent will populate this once jobs are applied to.</p></td></tr>';
    return;
  }

  tbody.innerHTML = filtered.map(r => {
    const ts = r.timestamp ? new Date(r.timestamp).toLocaleString('en-IN', {
      day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit'
    }) : '';
    return `<tr>
      <td class="ts">${ts}</td>
      <td><strong>${r.company || ''}</strong></td>
      <td>${r.job_title || ''}</td>
      <td>${r.platform || ''}</td>
      <td>${r.fit_score || '—'}</td>
      <td><span class="status status-${r.status || 'UNKNOWN'}">${r.status || '—'}</span></td>
      <td>${r.job_url ? `<a href="${r.job_url}" target="_blank">View →</a>` : ''}</td>
    </tr>`;
  }).join('');
}

function updateStats() {
  const total = allRows.length;
  const applied = allRows.filter(r => r.status === 'APPLIED').length;
  const pending = allRows.filter(r => r.status === 'AWAITING_MANUAL_SUBMIT').length;
  const failed = allRows.filter(r => r.status === 'FAILED').length;
  const today = new Date().toISOString().slice(0, 10);
  const todayCount = allRows.filter(r => r.timestamp && r.timestamp.startsWith(today)).length;

  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-applied').textContent = applied;
  document.getElementById('stat-pending').textContent = pending;
  document.getElementById('stat-failed').textContent = failed;
  document.getElementById('stat-today').textContent = todayCount;
}

setInterval(loadData, 30000); // auto-refresh every 30s
loadData();
</script>

</body>
</html>
